# GoReleaser config for psxdh. See docs/roadmap.md (Phase 3).
# Local snapshot:  goreleaser release --snapshot --clean
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: psxdh
    main: ./cmd/psxdh
    binary: psxdh
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: psxdh
    # Upload bare executables to GitHub Releases (no tar.gz/zip wrapper).
    formats: [binary]
    name_template: >-
      {{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{ if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
